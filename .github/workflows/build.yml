name: ffmpeg-wasm build

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ffmpegwasm/ffmpeg.wasm
          ref: v12.15

      - uses: actions/checkout@v6
        with:
          path: override

      - name: Update pkg-config database
        run: sudo ldconfig

      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Cache build
        id: cache-build
        uses: actions/cache@v5
        with:
          path: build-cache-st
          key: build-cache-st-v1-${{ hashFiles('Dockerfile', 'Makefile', 'build/*', 'override/*') }}
          restore-keys: |
            build-cache-st-v1-

      - name: Build FFmpeg
        run: |
          cp override/Dockerfile Dockerfile
          make prd EXTRA_ARGS="--cache-from=type=local,src=build-cache-st --cache-to=type=local,dest=build-cache-st,mode=max"

      - run: |
          ls -lR packages/core/dist/

      - name: Upload core
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-core
          path: packages/core/dist/*
