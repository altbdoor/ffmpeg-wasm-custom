name: ffmpeg-wasm build

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ffmpegwasm/ffmpeg.wasm
          ref: v12.15
          path: ffmpeg

      - uses: actions/checkout@v6
        with:
          path: base

      - name: Update pkg-config database
        run: sudo ldconfig

      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Override Dockerfile
        run: |
          cp base/Dockerfile ffmpeg/Dockerfile
          ls ffmpeg

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: |
          make prd
          ls -R packages/core/dist/
